rules:
- id: find-var-vals
  pattern-regex: "# GREG_JONAH_LOOK_HERE: (.+?)$"
  message: |
    Found git command: [$1]
  languages:
    - bash
  severity: INFO

- id: git-command-extraction
  pattern-either:
    - patterns:
      - pattern-either:
        - pattern: git $COM ...
        - patterns: 
          - pattern: git $COM ... $SEC ...
          - metavariable-pattern:
              metavariable: $SEC
              patterns:
                - pattern-not-regex: ^(-|--)[a-zA-Z]
        - patterns: 
          - pattern: git $COM ... $FLAG $VAL ...
          - metavariable-pattern:
              metavariable: $FLAG
              patterns:
                - pattern-not-regex: ^(-|--)[a-zA-Z-]+=
                - pattern-regex: ^(-|--)[a-zA-Z]
        - patterns: 
          - pattern: git $COM ... $SEC ... $FLAG $VAL ...
          - metavariable-pattern:
              metavariable: $FLAG
              patterns:
                - pattern-not-regex: ^(-|--)[a-zA-Z-]+=
                - pattern-regex: ^(-|--)[a-zA-Z]
          - metavariable-pattern:
              metavariable: $SEC
              patterns:
                - pattern-not-regex: ^(-|--)[a-zA-Z]
        - patterns:
          - pattern: git $COM ... $FEQVAL ...
          - metavariable-pattern:
              metavariable: $FEQVAL
              pattern-regex: ^(-|--)[a-zA-Z-]+=
      - metavariable-pattern:
          metavariable: $COM
          patterns:
            - pattern-not-regex: ^(-|--)[a-zA-Z]

  message: |
    Found git command with: [$FLAG] [$VAL] [$COM] [$SEC] [$FEQVAL]
  languages:
    - bash
  severity: INFO

- id: wget-url-extraction
  pattern-either:
    - patterns:
      - pattern: wget ... $POT $URL ...
      - metavariable-pattern:
          metavariable: $POT
          patterns:
            - pattern-regex: (^(-|--)[a-zA-Z-]+=)|.*?
            - pattern-not-regex: ^(-|--)[a-zA-Z]
      - metavariable-pattern:
          metavariable: $URL
          patterns:
            - pattern-not-regex: ^(-|--)[a-zA-Z]
    - patterns:
      - pattern: wget $URL ...
      - metavariable-pattern:
          metavariable: $URL
          patterns:
            - pattern-not-regex: ^(-|--)[a-zA-Z]
    - patterns:
      - pattern: wget ... $FLAG $VAL ...
      - metavariable-pattern:
          metavariable: $FLAG
          patterns:
            - pattern-not-regex: ^(-|--)[a-zA-Z-]+=
            - pattern-regex: ^(-|--)[a-zA-Z]
    - patterns:
      - pattern: wget ... $FEQVAL ...
      - metavariable-pattern:
          metavariable: $FEQVAL
          pattern-regex: ^(-|--)[a-zA-Z-]+=
  
  message: |
    Found wget command with URL|||$POT|||$URL|||$FLAG|||$VAL|||$FEQVAL
  languages:
    - bash
  severity: INFO

- id: curl-url-extraction
  pattern-either:
    - patterns:
      - pattern: curl ... $POT $URL ...
      - metavariable-pattern:
          metavariable: $POT
          patterns:
            - pattern-regex: (^(-|--)[a-zA-Z-]+=)|.*?
            - pattern-not-regex: ^(-|--)[a-zA-Z]
      - metavariable-pattern:
          metavariable: $URL
          patterns:
            - pattern-not-regex: ^(-|--)[a-zA-Z]
    - patterns:
      - pattern: curl $URL ...
      - metavariable-pattern:
          metavariable: $URL
          patterns:
            - pattern-not-regex: ^(-|--)[a-zA-Z]
    - patterns:
      - pattern: curl ... $FLAG $VAL ...
      - metavariable-pattern:
          metavariable: $FLAG
          patterns:
            - pattern-not-regex: ^(-|--)[a-zA-Z-]+=
            - pattern-regex: ^(-|--)[a-zA-Z]
    - patterns:
      - pattern: curl ... $FEQVAL ...
      - metavariable-pattern:
          metavariable: $FEQVAL
          pattern-regex: ^(-|--)[a-zA-Z-]+=

  message: |
    Found curl command with URL|||$POT|||$URL|||$FLAG|||$VAL|||$FEQVAL
  languages:
    - bash
  severity: INFO

- id: gh-url-extraction
  pattern-either:
    - patterns:
      - pattern: gh api ... $POT $URL ...
      - metavariable-pattern:
          metavariable: $POT
          patterns:
            - pattern-regex: (^(-|--)[a-zA-Z-]+=)|.*?
            - pattern-not-regex: ^(-|--)[a-zA-Z]
      - metavariable-pattern:
          metavariable: $URL
          patterns:
            - pattern-not-regex: ^(-|--)[a-zA-Z]
    - patterns:
      - pattern: gh api $URL ...
      - metavariable-pattern:
          metavariable: $URL
          patterns:
            - pattern-not-regex: ^(-|--)[a-zA-Z]
    - patterns:
      - pattern: gh api ... $FLAG $VAL ...
      - metavariable-pattern:
          metavariable: $FLAG
          pattern-either:
            - pattern: -X
            - pattern: --Request
            - pattern: --url
    - patterns:
      - pattern: gh api ... $FEQVAL ...
      - metavariable-pattern:
          metavariable: $FEQVAL
          pattern-regex: ^(-|--)[a-zA-Z-]+=
    - patterns:
      - pattern-either:
        - pattern: gh $COM ...
        - patterns: 
          - pattern: gh $COM ... $SEC ...
          - metavariable-pattern:
              metavariable: $SEC
              patterns:
                - pattern-not-regex: ^(-|--)[a-zA-Z]
                - pattern-not: api
        - patterns: 
          - pattern: gh $COM ... $FLAG $VAL ...
          - metavariable-pattern:
              metavariable: $FLAG
              patterns:
                - pattern-not-regex: ^(-|--)[a-zA-Z-]+=
                - pattern-regex: ^(-|--)[a-zA-Z]
        - patterns:
          - pattern: gh $COM ... $FEQVAL ...
          - metavariable-pattern:
              metavariable: $FEQVAL
              pattern-regex: ^(-|--)[a-zA-Z-]+=
        - patterns: 
          - pattern: gh $COM ... $SEC ... $FLAG $VAL ...
          - metavariable-pattern:
              metavariable: $FLAG
              patterns:
                - pattern-not-regex: ^(-|--)[a-zA-Z-]+=
                - pattern-regex: ^(-|--)[a-zA-Z]
          - metavariable-pattern:
              metavariable: $SEC
              patterns:
                - pattern-not-regex: ^(-|--)[a-zA-Z]
                - pattern-not: api
        - patterns:
          - pattern: gh $COM ... $SEC ... $FEQVAL ...
          - metavariable-pattern:
              metavariable: $FEQVAL
              pattern-regex: ^(-|--)[a-zA-Z-]+=
      - metavariable-pattern:
          metavariable: $COM
          patterns:
            - pattern-not-regex: ^(-|--)[a-zA-Z]
            - pattern-not: api

  message: |
    Found gh command with URL:|||$POT|||$URL|||$FLAG|||$VAL|||$COM|||$SEC||$FEQVAL
  languages:
    - bash
  severity: INFO

