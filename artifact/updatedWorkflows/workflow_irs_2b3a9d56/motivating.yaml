name: build-test-deploy
permissions:
  contents: read
  id-token: write
  pages: write
'on': push
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: checkout repo
      uses: actions/checkout@v3
    - name: use node.js
      uses: actions/setup-node@v3
    - run: npm install
    - run: npm run build
  deploy:
    needs: build
    permissions:
      contents: read
      id-token: write
      pages: write
    runs-on: ubuntu-latest
    steps:
    - name: checkout repo
      uses: actions/checkout@v3
    - run: npm install
    - run: npm run build
    - name: deploy
      id: deployment
      uses: actions/deploy-pages@v1
